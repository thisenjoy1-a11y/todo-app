<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투두 캘린더</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="투두 캘린더" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 60%, #5ee7df 100%);
      background-attachment: fixed;
      min-height: 100vh;
      padding: 0;
    }

    /* ── 상단 헤더 ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 12px; background: rgba(255,255,255,0.25);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 0 0 16px 16px;
      border-top: none; position: sticky; top: 0; z-index: 100;
    }
    h1 { font-size: 1.2rem; color: #2d2b55; }
    .top-actions { display: flex; gap: 8px; }
    .briefing-btn, .sync-btn, .test-notif-btn {
      padding: 8px 14px; color: #fff;
      border: none; border-radius: 20px; font-size: 0.78rem;
      cursor: pointer; font-weight: 600;
    }
    .briefing-btn { background: #ff8c42; }
    .sync-btn { background: #28a745; }
    .sync-btn.syncing { opacity: 0.7; cursor: not-allowed; }
    .test-notif-btn { background: #6c63ff; }

    /* ── 레이아웃 ── */
    .layout {
      display: flex; flex-direction: column; gap: 0;
      max-width: 480px; margin: 0 auto;
    }

    /* ── 캘린더 ── */
    .calendar-card {
      background: rgba(255,255,255,0.2); padding: 16px; margin: 0;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-header span { font-size: 1.05rem; font-weight: 700; color: #1a1a2e; }
    .cal-header button {
      background: none; border: none; font-size: 1.4rem;
      cursor: pointer; color: #999; padding: 4px 12px;
    }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      grid-template-rows: 24px repeat(6, 1fr);
      gap: 1px; background: rgba(255,255,255,0.15);
      height: calc(100vw * 1.1);
      max-height: 480px;
    }
    .cal-dow {
      text-align: center; font-size: 0.72rem; font-weight: 600;
      color: #999; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.2);
    }

    .cal-day {
      position: relative;
      display: flex; flex-direction: column; align-items: stretch;
      cursor: pointer; font-size: 0.82rem; color: #333;
      background: rgba(255,255,255,0.25); padding: 3px 2px 2px; overflow: hidden;
    }
    .cal-day:active { background: rgba(108,99,255,0.2); }
    .cal-day.empty { cursor: default; background: rgba(255,255,255,0.1); }
    .cal-day.today .day-num {
      background: #6c63ff; color: #fff; border-radius: 50%;
      width: 22px; height: 22px; display: flex;
      align-items: center; justify-content: center; font-size: 0.75rem;
    }
    .cal-day.selected { background: rgba(108,99,255,0.2); }
    .cal-day.sunday .day-num { color: #e74c3c; }
    .cal-day.saturday .day-num { color: #3498db; }
    .day-num { font-size: 0.75rem; line-height: 1; text-align: center; margin-bottom: 2px; }
    .cal-events { display: flex; flex-direction: column; gap: 1px; overflow: hidden; flex: 1; }
    .cal-ev {
      font-size: 0.52rem; line-height: 1.3; padding: 1px 2px;
      border-radius: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      background: #dbeafe; color: #2563eb;
    }
    .cal-ev.pri-high { background: #fecaca; color: #dc2626; }
    .cal-ev.pri-normal { background: #dbeafe; color: #2563eb; }
    .cal-ev.pri-low { background: #f3f4f6; color: #9ca3af; }
    .cal-ev.done { background: #f0f0f0; color: #bbb; text-decoration: line-through; }
    .cal-ev.overdue { background: #fecaca; color: #dc2626; }

    /* ── 할일 카드 ── */
    .todo-card {
      background: rgba(255,255,255,0.2); padding: 16px; margin: 0;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    .todo-card h2 { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }

    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-group input[type="text"] {
      padding: 12px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 12px; font-size: 0.9rem; outline: none;
      background: rgba(255,255,255,0.4);
    }
    .input-group input[type="text"]:focus { border-color: #6c63ff; background: rgba(255,255,255,0.6); }
    .input-row2 { display: flex; gap: 8px; }
    .input-group input[type="date"] {
      flex: 1; padding: 10px 12px; border: 1.5px solid #e0e0e0;
      border-radius: 12px; font-size: 0.88rem; outline: none;
      color: #333; background: rgba(255,255,255,0.4);
    }
    .input-group input[type="date"]:focus { border-color: #6c63ff; background: rgba(255,255,255,0.6); }
    .input-group button {
      padding: 10px 20px; background: #6c63ff; color: #fff;
      border: none; border-radius: 12px; font-size: 0.9rem;
      cursor: pointer; font-weight: 600;
    }

    .filters { display: flex; gap: 6px; margin-bottom: 12px; }
    .filters button {
      flex: 1; padding: 8px; border: 1.5px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.3); border-radius: 20px; font-size: 0.8rem;
      cursor: pointer; color: #888;
    }
    .filters button.active { border-color: rgba(108,99,255,0.6); color: #6c63ff; font-weight: 700; background: rgba(108,99,255,0.15); }

    #todo-list { list-style: none; }

    .todo-item {
      border-radius: 14px; margin-bottom: 8px; background: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.4); overflow: hidden;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .todo-item.done .todo-text { text-decoration: line-through; color: #bbb; }
    .todo-item.done .todo-date { color: #ddd; }

    .todo-main {
      display: flex; align-items: center; gap: 10px; padding: 14px 12px;
    }
    .todo-main input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: #6c63ff; cursor: pointer; flex-shrink: 0;
    }
    .todo-info { flex: 1; min-width: 0; }
    .todo-text { font-size: 0.92rem; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .todo-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .todo-date { font-size: 0.75rem; color: #999; }

    .pri-badge {
      font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 20px;
    }
    .pri-high   { background: #ffe4e4; color: #e74c3c; }
    .pri-normal { background: #e8f4fd; color: #3498db; }
    .pri-low    { background: #f0f0f0; color: #999; }

    .note-dot { font-size: 0.72rem; color: #6c63ff; display: none; }
    .note-dot.visible { display: inline; }
    .todo-memo-preview { font-size: 0.75rem; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .todo-item.done .todo-memo-preview { color: #ccc; }

    .time-tag {
      font-size: 0.72rem; color: #888; background: #f0f0f0;
      padding: 2px 6px; border-radius: 8px;
    }

    .expand-btn {
      background: none; border: none; color: #ccc; font-size: 0.8rem;
      cursor: pointer; padding: 3px 7px; border-radius: 6px;
      transition: color 0.2s, transform 0.2s; flex-shrink: 0;
    }
    .expand-btn:hover { color: #6c63ff; }
    .expand-btn.open { transform: rotate(180deg); color: #6c63ff; }

    .delete-btn {
      background: none; border: none; color: #ccc; font-size: 1rem;
      cursor: pointer; padding: 2px 6px; border-radius: 6px; flex-shrink: 0;
      display: none;
    }

    .detail-actions {
      display: flex; gap: 10px; margin-top: 14px; justify-content: space-between; align-items: center;
    }
    .detail-save-btn {
      flex: 1; padding: 10px; background: #6c63ff; color: #fff; border: none;
      border-radius: 10px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }
    .detail-save-btn:active { background: #5a52e0; }
    .detail-delete-btn {
      padding: 10px 16px; background: none; color: #e74c3c; border: 1.5px solid #e74c3c;
      border-radius: 10px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }
    .detail-delete-btn:active { background: #fde8e8; }

    .todo-detail {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      background: rgba(108,99,255,0.08); border-top: 1px solid transparent;
    }
    .todo-detail.open {
      max-height: 460px;
      border-top-color: #ede9ff;
      padding: 14px 14px 16px;
    }

    .detail-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .detail-label { font-size: 0.75rem; font-weight: 600; color: #888; min-width: 48px; }

    .pri-btn {
      padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e0e0e0;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      background: #fff; color: #aaa;
    }
    .pri-btn.sel-high   { border-color: #e74c3c; background: #ffe4e4; color: #e74c3c; }
    .pri-btn.sel-normal { border-color: #3498db; background: #e8f4fd; color: #3498db; }
    .pri-btn.sel-low    { border-color: #bbb; background: #f0f0f0; color: #777; }

    .time-input {
      padding: 6px 10px; border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 0.82rem; outline: none; color: #333;
    }
    .time-input:focus { border-color: #6c63ff; }

    .memo-textarea {
      width: 100%; min-height: 80px; padding: 10px 12px;
      border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 0.85rem;
      outline: none; resize: vertical; font-family: inherit; color: #333;
      background: #fff; line-height: 1.5;
    }
    .memo-textarea:focus { border-color: #6c63ff; }
    .memo-textarea::placeholder { color: #ccc; }

    .summary { margin-top: 12px; text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.7); padding-bottom: 20px; }
    .empty-msg { text-align: center; color: #ccc; padding: 24px 0; font-size: 0.9rem; }

    .banner {
      background: rgba(255,248,230,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid #ffd97a;
      padding: 10px 16px; font-size: 0.82rem; color: #7a5c00;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .banner button {
      padding: 6px 14px; background: #ffb800; color: #fff;
      border: none; border-radius: 8px; font-size: 0.8rem; cursor: pointer; white-space: nowrap;
    }
    .banner.hidden { display: none; }

    .loading-msg {
      text-align: center; color: #6c63ff; padding: 24px 0;
      font-size: 0.9rem; animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── 브리핑 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.3); z-index: 1000;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 20px 20px 0 0; padding: 0;
      max-width: 480px; width: 100%;
      box-shadow: 0 -4px 40px rgba(0,0,0,0.18); animation: slideUp 0.25s ease;
      max-height: 88vh; display: flex; flex-direction: column;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-top { padding: 20px 24px 0; flex-shrink: 0; background: transparent; }
    .modal-scroll {
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 0 24px; flex: 1;
    }
    .modal-bottom {
      padding: 12px 24px 32px; flex-shrink: 0;
      background: transparent; border-top: 1px solid rgba(255,255,255,0.3);
    }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .modal-header h2 { font-size: 1.15rem; color: #1a1a2e; }
    .modal-close {
      background: #f0f0f0; border: none; border-radius: 50%; font-size: 1.3rem;
      cursor: pointer; color: #555; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .modal-close:active { background: #e74c3c; color: #fff; }

    .modal-date { font-size: 0.8rem; color: #aaa; margin-bottom: 16px; }

    .tts-bar {
      display: flex; align-items: center; gap: 8px;
      background: rgba(108,99,255,0.12); border-radius: 12px; padding: 10px 14px; margin-bottom: 18px;
    }
    .tts-bar .tts-status { flex: 1; font-size: 0.82rem; color: #6c63ff; }
    .tts-bar button {
      padding: 6px 14px; border: none; border-radius: 8px;
      font-size: 0.8rem; cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .tts-play  { background: #6c63ff; color: #fff; }
    .tts-stop  { background: #e0e0e0; color: #555; }

    .modal-stats { display: flex; gap: 8px; margin-bottom: 18px; }
    .stat-box {
      flex: 1; background: rgba(108,99,255,0.12); backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 8px; text-align: center;
    }
    .stat-box .num { font-size: 1.4rem; font-weight: 700; color: #6c63ff; }
    .stat-box .label { font-size: 0.72rem; color: #888; margin-top: 2px; }
    .stat-box.danger .num { color: #e74c3c; }
    .stat-box.danger { background: #fff4f4; }

    .modal-section { margin-bottom: 16px; }
    .modal-section h3 { font-size: 0.8rem; font-weight: 700; color: #888; margin-bottom: 8px; }

    .briefing-item {
      padding: 10px 12px; background: rgba(255,255,255,0.4); border-radius: 12px;
      margin-bottom: 6px; font-size: 0.88rem; color: #333; border-left: 3px solid #6c63ff;
    }
    .briefing-item.overdue { border-left-color: #e74c3c; }
    .b-date { font-size: 0.75rem; color: #999; margin-top: 2px; }
    .briefing-empty { font-size: 0.88rem; color: #bbb; text-align: center; padding: 12px 0; }

    .modal-bottom button {
      width: 100%; padding: 16px; background: #6c63ff; color: #fff;
      border: none; border-radius: 12px; font-size: 1rem;
      cursor: pointer; font-weight: 700;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .modal-bottom button:active { background: #574fd6; }

    /* ── FAB 버튼 & 등록 모달 ── */
    .fab {
      position: fixed; bottom: 28px; right: 20px; z-index: 500;
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(108,99,255,0.85); color: #fff; border: none;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      font-size: 2rem; line-height: 1;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, background 0.2s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(0.92); }
    .fab.open { transform: rotate(45deg); background: rgba(108,99,255,0.95); }

    .fab-menu {
      position: fixed; bottom: 96px; right: 20px; z-index: 500;
      background: rgba(30,30,50,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 8px 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      display: none; min-width: 180px;
      animation: fabUp 0.15s ease;
    }
    .fab-menu.show { display: block; }
    @keyframes fabUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .fab-menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; color: #fff; font-size: 0.92rem;
      cursor: pointer; transition: background 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .fab-menu-item:active { background: rgba(255,255,255,0.1); }
    .fab-menu-item .fab-icon { font-size: 1.1rem; width: 24px; text-align: center; }

    .fab-overlay {
      position: fixed; inset: 0; z-index: 490;
      background: rgba(0,0,0,0.3); display: none;
    }
    .fab-overlay.show { display: block; }

    .add-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.3); z-index: 1000;
      align-items: flex-end; justify-content: center;
    }
    .add-modal-overlay.show { display: flex; }

    .add-modal {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 20px 20px 0 0;
      max-width: 480px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      padding: 0; animation: slideUp 0.25s ease;
    }

    .add-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    .add-modal-header h2 { font-size: 1.1rem; color: #1a1a2e; }
    .add-modal-close {
      background: #f0f0f0; border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 1.1rem;
      cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center;
    }
    .add-modal-save {
      background: #6c63ff; color: #fff; border: none;
      border-radius: 20px; padding: 8px 20px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer;
    }

    .add-form { padding: 16px 20px 32px; }
    .add-form-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid #f5f5f5;
    }
    .add-form-row:last-child { border-bottom: none; }
    .add-form-icon { font-size: 1.1rem; color: #888; width: 24px; text-align: center; flex-shrink: 0; }
    .add-form-label { font-size: 0.82rem; color: #888; min-width: 50px; flex-shrink: 0; }
    .add-form-input {
      flex: 1; border: none; outline: none; font-size: 0.95rem;
      color: #333; background: transparent; font-family: inherit;
    }
    .add-form-input::placeholder { color: #ccc; }
    .add-form-input[type="date"],
    .add-form-input[type="time"] { font-size: 0.9rem; color: #333; }

    .add-pri-group { display: flex; gap: 8px; flex: 1; }
    .add-pri-btn {
      padding: 6px 16px; border-radius: 20px; border: 1.5px solid #e0e0e0;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      background: #fff; color: #aaa;
    }
    .add-pri-btn.sel-high { border-color: #e74c3c; background: #ffe4e4; color: #e74c3c; }
    .add-pri-btn.sel-normal { border-color: #3498db; background: #e8f4fd; color: #3498db; }
    .add-pri-btn.sel-low { border-color: #bbb; background: #f0f0f0; color: #777; }

    .add-form-textarea {
      flex: 1; border: none; outline: none; font-size: 0.88rem;
      color: #333; background: transparent; font-family: inherit;
      resize: none; min-height: 60px; line-height: 1.5;
    }
    .add-form-textarea::placeholder { color: #ccc; }

    /* ── 데스크톱 ── */
    @media (min-width: 661px) {
      body { padding: 32px 16px; }
      .top-bar { max-width: 900px; margin: 0 auto 20px; border: 1px solid rgba(255,255,255,0.3); border-radius: 16px; position: static; background: rgba(255,255,255,0.25); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
      .layout { flex-direction: row; gap: 24px; max-width: 900px; }
      .calendar-card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); flex: 1 1 320px; border: 1px solid rgba(255,255,255,0.3); padding: 24px; }
      .todo-card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); flex: 1 1 300px; padding: 24px; }
      .cal-grid { height: 420px; max-height: none; }
    }
  </style>
</head>
<body>

  <div class="banner hidden" id="notif-banner">
    <span>🔔 오전 7시 자동 알림을 받으려면 알림을 허용해주세요.</span>
    <button onclick="requestNotifPermission()">알림 허용</button>
  </div>

  <div class="banner hidden" id="install-banner">
    <span>📲 홈 화면에 추가하면 앱처럼 사용할 수 있어요!</span>
    <button onclick="installPWA()">홈 화면 추가</button>
  </div>

  <div class="top-bar">
    <h1>📅 투두</h1>
    <div class="top-actions">
      <button class="briefing-btn" onclick="showBriefing(true)">☀️ 브리핑</button>
      <button class="sync-btn" id="sync-btn" onclick="syncTodos()">🔄</button>
    </div>
  </div>

  <div class="layout">
    <div class="calendar-card">
      <div class="cal-header">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="cal-title"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="todo-card">
      <h2 id="todo-panel-title">📋 전체 할 일</h2>
      <input type="hidden" id="todo-input" />
      <input type="hidden" id="todo-date" />
      <div class="filters">
        <button class="active" onclick="setFilter('all', this)">전체</button>
        <button onclick="setFilter('active', this)">미완료</button>
        <button onclick="setFilter('done', this)">완료</button>
      </div>
      <ul id="todo-list"></ul>
      <p class="summary" id="summary"></p>
    </div>
  </div>

  <!-- FAB 버튼 -->
  <div class="fab-overlay" id="fab-overlay" onclick="closeFabMenu()"></div>
  <div class="fab-menu" id="fab-menu">
    <button class="fab-menu-item" onclick="openAddModal('todo')">
      <span class="fab-icon">✅</span> 할 일
    </button>
    <button class="fab-menu-item" onclick="openAddModal('event')">
      <span class="fab-icon">📅</span> 일정
    </button>
  </div>
  <button class="fab" id="fab-btn" onclick="toggleFabMenu()">+</button>

  <!-- 등록 모달 -->
  <div class="add-modal-overlay" id="add-modal-overlay">
    <div class="add-modal">
      <div class="add-modal-header">
        <button class="add-modal-close" onclick="closeAddModal()">✕</button>
        <h2 id="add-modal-title">할 일</h2>
        <button class="add-modal-save" onclick="saveAddModal()">저장</button>
      </div>
      <div class="add-form">
        <div class="add-form-row">
          <span class="add-form-icon">📝</span>
          <input class="add-form-input" id="add-title" type="text" placeholder="제목을 입력하세요." />
        </div>
        <div class="add-form-row">
          <span class="add-form-icon">📆</span>
          <span class="add-form-label">날짜</span>
          <input class="add-form-input" id="add-date" type="date" />
        </div>
        <div class="add-form-row">
          <span class="add-form-icon">⏰</span>
          <span class="add-form-label">시간</span>
          <input class="add-form-input" id="add-time" type="time" />
        </div>
        <div class="add-form-row">
          <span class="add-form-icon">🔴</span>
          <span class="add-form-label">우선순위</span>
          <div class="add-pri-group">
            <button class="add-pri-btn sel-high" id="add-pri-high" onclick="setAddPri('high')">높음</button>
            <button class="add-pri-btn" id="add-pri-normal" onclick="setAddPri('normal')">보통</button>
            <button class="add-pri-btn" id="add-pri-low" onclick="setAddPri('low')">낮음</button>
          </div>
        </div>
        <div class="add-form-row" style="align-items:flex-start;">
          <span class="add-form-icon" style="margin-top:2px;">📋</span>
          <span class="add-form-label" style="margin-top:2px;">메모</span>
          <textarea class="add-form-textarea" id="add-memo" placeholder="메모를 입력하세요."></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- 브리핑 모달 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-top">
        <div class="modal-header">
          <h2>☀️ 오늘 브리핑</h2>
          <button class="modal-close" id="modal-close-btn">✕</button>
        </div>
        <p class="modal-date" id="modal-date"></p>
      </div>

      <div class="modal-scroll">
        <div class="tts-bar">
          <span class="tts-status" id="tts-status">🔊 ▶ 재생 버튼을 눌러 브리핑 시작</span>
          <button class="tts-play" id="tts-play-btn">▶ 재생</button>
          <button class="tts-stop" id="tts-stop-btn">■ 중지</button>
        </div>

        <div class="modal-stats" id="modal-stats"></div>

        <div class="modal-section">
          <h3>📌 오늘 할 일</h3>
          <div id="modal-today-list"></div>
        </div>

        <div class="modal-section" id="modal-overdue-section">
          <h3>⚠️ 미완료 지난 일정</h3>
          <div id="modal-overdue-list"></div>
        </div>
      </div>

      <div class="modal-bottom">
        <button id="modal-confirm-btn">확인, 시작하기!</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dyskcxfcmpuscpmlrfho.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_BPaXqHIp7GS2ZJp3tFIKsg_MyXaGisU';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let todos = [];
    let filter = 'all';
    let selectedDate = null;
    let expandedId = null;
    let _debounceTimers = {};
    let _pendingUpdates = {};
    let _briefingTodayTodos = [];
    let _briefingOverdue = [];

    const today = new Date();
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();

    function todayStr() { return fmt(today); }
    function fmt(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function mapFromDB(t) {
      return {
        id: t.id,
        text: t.title || '',
        date: t.date || '',
        done: t.completed || false,
        detail: t.description || '',
        priority: t.priority || 'normal',
        time: t.time || ''
      };
    }

    async function loadTodos() {
      const list = document.getElementById('todo-list');
      list.innerHTML = '<li class="loading-msg">⏳ 불러오는 중...</li>';
      const { data, error } = await sb.from('todos').select('*').order('created_at', { ascending: true });
      if (error) {
        console.error('로드 오류:', error);
        list.innerHTML = '<li class="empty-msg">❌ 로드 실패. 새로고침 해주세요.</li>';
        return;
      }
      todos = data.map(mapFromDB);
      renderCalendar();
      renderTodos();
    }

    async function syncTodos() {
      const btn = document.getElementById('sync-btn');
      btn.textContent = '⏳ 동기화 중...';
      btn.classList.add('syncing');
      await loadTodos();
      btn.textContent = '🔄 새로고침';
      btn.classList.remove('syncing');
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const dateInput = document.getElementById('todo-date');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      const date = dateInput.value || selectedDate || todayStr();

      const { data, error } = await sb.from('todos').insert({
        title: text, date: date, completed: false,
        description: '', priority: 'normal', time: ''
      }).select().single();

      if (error) { console.error('추가 오류:', error); alert('추가 실패.'); return; }
      input.value = '';
      todos.push(mapFromDB(data));
      renderCalendar();
      renderTodos();
    }

    async function toggle(id) {
      await flushPending(id);
      const t = todos.find(t => t.id === id);
      if (!t) return;
      const newDone = !t.done;
      const { error } = await sb.from('todos').update({ completed: newDone }).eq('id', id);
      if (error) { console.error('토글 오류:', error); return; }
      t.done = newDone;
      filter = 'all';
      document.querySelectorAll('.filters button').forEach((b, i) => {
        if (i === 0) b.classList.add('active');
        else b.classList.remove('active');
      });
      expandedId = id;
      renderCalendar();
      renderTodos();
    }

    async function remove(id) {
      const { error } = await sb.from('todos').delete().eq('id', id);
      if (error) { console.error('삭제 오류:', error); return; }
      todos = todos.filter(t => t.id !== id);
      if (expandedId === id) expandedId = null;
      renderCalendar();
      renderTodos();
    }

    function confirmRemove(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      if (confirm(`"${t.text}" 일정을 삭제할까요?\n삭제하면 복구할 수 없습니다.`)) {
        remove(id);
      }
    }

    async function saveAndClose(id) {
      await flushPending(id);
      expandedId = null;
      renderCalendar();
      renderTodos();
      // 저장 완료 표시
      const item = document.querySelector(`[data-id="${id}"]`);
      if (item) {
        const text = item.querySelector('.todo-text');
        if (text) {
          const orig = text.textContent;
          text.textContent = '✅ 저장됨!';
          setTimeout(() => { text.textContent = orig; }, 1000);
        }
      }
    }

    function toggleExpand(id) {
      expandedId = (expandedId === id) ? null : id;
      renderTodos();
    }

    async function updateField(id, field, value) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      t[field] = value;

      if (field === 'text') {
        const textEl = document.querySelector(`[data-id="${id}"] .todo-text`);
        if (textEl) textEl.textContent = value;
      }
      if (field === 'detail') {
        const dot = document.querySelector(`[data-id="${id}"] .note-dot`);
        if (dot) dot.classList.toggle('visible', value.trim().length > 0);
      }
      if (field === 'priority') {
        const badge = document.querySelector(`[data-id="${id}"] .pri-badge`);
        if (badge) {
          const labels = { high: '높음', normal: '보통', low: '낮음' };
          badge.className = `pri-badge pri-${value}`;
          badge.textContent = labels[value];
        }
        ['high','normal','low'].forEach(p => {
          const btn = document.querySelector(`[data-id="${id}"] .pri-btn-${p}`);
          if (btn) btn.className = `pri-btn pri-btn-${p}${value === p ? ' sel-'+p : ''}`;
        });
      }
      if (field === 'time') {
        const tag = document.querySelector(`[data-id="${id}"] .time-tag`);
        if (tag) { tag.textContent = value ? `⏰ ${value}` : ''; tag.style.display = value ? '' : 'none'; }
      }

      const fieldMap = { text: 'title', done: 'completed', detail: 'description', priority: 'priority', time: 'time', date: 'date' };
      const dbField = fieldMap[field];
      if (!dbField) return;

      _pendingUpdates[id + '|' + field] = { dbField, value };
      clearTimeout(_debounceTimers[id + field]);
      _debounceTimers[id + field] = setTimeout(async () => {
        delete _pendingUpdates[id + '|' + field];
        const { error } = await sb.from('todos').update({ [dbField]: value }).eq('id', id);
        if (error) console.error('업데이트 오류:', error);
      }, 500);
    }

    async function flushPending(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      const item = document.querySelector(`[data-id="${id}"]`);
      if (item) {
        const textarea = item.querySelector('.memo-textarea');
        if (textarea) t.detail = textarea.value;
        const timeInput = item.querySelector('input[type="time"]');
        if (timeInput) t.time = timeInput.value;
        const titleInput = item.querySelector('.todo-detail input[type="text"]');
        if (titleInput) t.text = titleInput.value;
      }
      ['text', 'detail', 'priority', 'time'].forEach(field => {
        clearTimeout(_debounceTimers[id + field]);
        delete _debounceTimers[id + field];
        delete _pendingUpdates[id + '|' + field];
      });
      const { error } = await sb.from('todos').update({
        title: t.text, description: t.detail, time: t.time, priority: t.priority
      }).eq('id', id);
      if (error) console.error('저장 오류:', error);
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTodos();
    }

    function selectDate(dateStr) {
      selectedDate = (selectedDate === dateStr) ? null : dateStr;
      document.getElementById('todo-date').value = selectedDate || '';
      renderCalendar(); renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById('todo-list');
      const title = document.getElementById('todo-panel-title');
      let base = selectedDate ? todos.filter(t => t.date === selectedDate) : todos;
      base = base.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);
      base.sort((a, b) => a.date.localeCompare(b.date));

      if (selectedDate) {
        const [, m, d] = selectedDate.split('-');
        title.textContent = `📋 ${parseInt(m)}월 ${parseInt(d)}일`;
      } else {
        title.textContent = '📋 전체 할 일';
      }

      if (base.length === 0) {
        list.innerHTML = `<li class="empty-msg">할 일이 없습니다 🎉</li>`;
      } else {
        list.innerHTML = base.map(t => {
          const pri = t.priority || 'normal';
          const priLabel = { high: '높음', normal: '보통', low: '낮음' }[pri];
          const isOpen = expandedId === t.id;
          const hasNote = (t.detail || '').trim().length > 0;

          return `<li class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
            <div class="todo-main">
              <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle('${t.id}')" />
              <div class="todo-info">
                <div class="todo-text">${esc(t.text)}</div>
                ${t.detail ? `<div class="todo-memo-preview">${esc(t.detail.substring(0,60))}${t.detail.length>60?'...':''}</div>` : ''}
                <div class="todo-meta">
                  <span class="todo-date">${fmtLabel(t.date)}</span>
                  <span class="pri-badge pri-${pri}">${priLabel}</span>
                  ${t.time ? `<span class="time-tag">⏰ ${esc(t.time)}</span>` : ''}
                  <span class="note-dot ${hasNote ? 'visible' : ''}">📝</span>
                </div>
              </div>
              <button class="expand-btn ${isOpen ? 'open' : ''}" onclick="toggleExpand('${t.id}')" title="상세 보기">▼</button>
            </div>
            <div class="todo-detail ${isOpen ? 'open' : ''}">
              <div class="detail-row">
                <span class="detail-label">제목</span>
                <input class="time-input" style="flex:1" type="text" value="${esc(t.text)}"
                  oninput="updateField('${t.id}','text',this.value)" />
              </div>
              <div class="detail-row">
                <span class="detail-label">날짜</span>
                <input class="time-input" type="date" value="${esc(t.date||'')}"
                  onchange="updateField('${t.id}','date',this.value);renderCalendar();renderTodos();" />
              </div>
              <div class="detail-row">
                <span class="detail-label">우선순위</span>
                <button class="pri-btn pri-btn-high${pri==='high'?' sel-high':''}"   onclick="updateField('${t.id}','priority','high')">높음</button>
                <button class="pri-btn pri-btn-normal${pri==='normal'?' sel-normal':''}" onclick="updateField('${t.id}','priority','normal')">보통</button>
                <button class="pri-btn pri-btn-low${pri==='low'?' sel-low':''}"    onclick="updateField('${t.id}','priority','low')">낮음</button>
              </div>
              <div class="detail-row">
                <span class="detail-label">시간</span>
                <input class="time-input" type="time" value="${esc(t.time||'')}"
                  oninput="updateField('${t.id}','time',this.value)" />
              </div>
              <div class="detail-row" style="flex-direction:column; align-items:flex-start; gap:4px;">
                <span class="detail-label">메모</span>
                <textarea class="memo-textarea" placeholder="일정에 대한 상세 내용을 입력하세요..."
                  oninput="updateField('${t.id}','detail',this.value)">${esc(t.detail||'')}</textarea>
              </div>
              <div class="detail-actions">
                <button class="detail-save-btn" onclick="saveAndClose('${t.id}')">💾 저장</button>
                <button class="detail-delete-btn" onclick="confirmRemove('${t.id}')">🗑️ 삭제</button>
              </div>
            </div>
          </li>`;
        }).join('');
      }

      const src = selectedDate ? todos.filter(t => t.date === selectedDate) : todos;
      const done = src.filter(t => t.done).length;
      document.getElementById('summary').textContent =
        `전체 ${src.length}개 · 완료 ${done}개 · 미완료 ${src.length - done}개`;
    }

    function fmtLabel(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      const dows = ['일','월','화','수','목','금','토'];
      return `${m}월 ${d}일 (${dows[new Date(y, m-1, d).getDay()]})`;
    }

    function renderCalendar() {
      document.getElementById('cal-title').textContent = `${viewYear}년 ${viewMonth+1}월`;
      const grid = document.getElementById('cal-grid');
      const dows = ['일','월','화','수','목','금','토'];
      let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
      for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

      const todoMap = {};
      const ts = todayStr();
      todos.forEach(t => {
        if (!todoMap[t.date]) todoMap[t.date] = [];
        todoMap[t.date].push(t);
      });

      for (let d = 1; d <= daysInMonth; d++) {
        const m = String(viewMonth+1).padStart(2,'0');
        const dd = String(d).padStart(2,'0');
        const dateStr = `${viewYear}-${m}-${dd}`;
        const dow = (firstDay + d - 1) % 7;
        const items = todoMap[dateStr] || [];
        let evHtml = '';
        items.slice(0, 3).forEach(t => {
          let cls = t.done ? 'cal-ev done' : `cal-ev pri-${t.priority || 'normal'}`;
          evHtml += `<div class="${cls}">${esc(t.text)}</div>`;
        });
        if (items.length > 3) evHtml += `<div class="cal-ev" style="color:#999;background:#f5f5f5;">+${items.length - 3}</div>`;
        const cls = ['cal-day',
          dateStr === todayStr() ? 'today' : '',
          dateStr === selectedDate ? 'selected' : '',
          dow === 0 ? 'sunday' : '', dow === 6 ? 'saturday' : ''
        ].filter(Boolean).join(' ');
        html += `<div class="${cls}" onclick="selectDate('${dateStr}')">
          <div class="day-num">${d}</div>
          <div class="cal-events">${evHtml}</div>
        </div>`;
      }
      const totalCells = firstDay + daysInMonth;
      const paddedTotal = Math.ceil(totalCells / 7) * 7;
      const targetTotal = paddedTotal <= 35 ? 42 : (paddedTotal <= 42 ? 42 : 42);
      for (let i = totalCells; i < targetTotal; i++) html += `<div class="cal-day empty"></div>`;
      grid.innerHTML = html;
    }

    function changeMonth(dir) {
      viewMonth += dir;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
      renderCalendar();
    }

    // ══════════════════════════════════════
    // 브리핑 모달
    // ══════════════════════════════════════
    function showBriefing(autoRead = false) {
      const ts = todayStr();
      const [y, m, d] = ts.split('-').map(Number);
      const dows = ['일','월','화','수','목','금','토'];
      document.getElementById('modal-date').textContent =
        `${y}년 ${m}월 ${d}일 (${dows[new Date(y, m-1, d).getDay()]})`;

      const todayTodos = todos.filter(t => t.date === ts && !t.done);
      const overdue    = todos.filter(t => t.date < ts  && !t.done);
      const totalDone  = todos.filter(t => t.done).length;

      _briefingTodayTodos = todayTodos;
      _briefingOverdue    = overdue;

      document.getElementById('modal-stats').innerHTML = `
        <div class="stat-box"><div class="num">${todayTodos.length}</div><div class="label">오늘 할 일</div></div>
        <div class="stat-box ${overdue.length > 0 ? 'danger' : ''}">
          <div class="num">${overdue.length}</div><div class="label">미완료 지난 일</div>
        </div>
        <div class="stat-box"><div class="num">${totalDone}</div><div class="label">완료됨</div></div>`;

      document.getElementById('modal-today-list').innerHTML = todayTodos.length === 0
        ? `<div class="briefing-empty">오늘 예정된 할 일이 없어요 😊</div>`
        : todayTodos.map(t => {
            const pri = t.priority || 'normal';
            const priLabel = { high: '🔴 높음', normal: '🔵 보통', low: '⚪ 낮음' }[pri];
            return `<div class="briefing-item">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
                <span>📌 ${esc(t.text)}</span>
                <span style="font-size:0.72rem;color:#888;">${priLabel}${t.time ? ' · ⏰ '+esc(t.time) : ''}</span>
              </div>
              ${t.detail ? `<div style="margin-top:5px;font-size:0.8rem;color:#777;white-space:pre-wrap;">${esc(t.detail)}</div>` : ''}
            </div>`;
          }).join('');

      const overdueSection = document.getElementById('modal-overdue-section');
      if (overdue.length === 0) {
        overdueSection.style.display = 'none';
      } else {
        overdueSection.style.display = '';
        document.getElementById('modal-overdue-list').innerHTML =
          overdue.map(t => `<div class="briefing-item overdue">
            ⚠️ ${esc(t.text)}<div class="b-date">${fmtLabel(t.date)}</div>
          </div>`).join('');
      }

      document.getElementById('modal-overlay').classList.add('show');

      if (autoRead) {
        setTimeout(() => startTTS(), 400);
      } else {
        document.getElementById('tts-status').textContent = '🔊 ▶ 재생 버튼으로 음성 브리핑';
      }
    }

    function closeBriefing() {
      stopTTS();
      document.getElementById('modal-overlay').classList.remove('show');
    }

    function addTap(id, fn) {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('touchend', function(e) { e.preventDefault(); fn(); }, { passive: false });
      el.addEventListener('click', fn);
    }

    function closeModalOutside(e) {
      if (e.target === document.getElementById('modal-overlay')) closeBriefing();
    }

    // ══════════════════════════════════════
    // TTS (ElevenLabs)
    // ══════════════════════════════════════
    function buildBriefingText() {
      const h = new Date().getHours();
      const greeting = h < 11 ? '좋은 아침이에요' : '안녕하세요';
      let text = `${greeting}. `;

      if (_briefingTodayTodos.length === 0 && _briefingOverdue.length === 0) {
        text += '오늘은 예정된 할 일이 없어요. 좋은 하루 보내세요!';
      } else {
        if (_briefingTodayTodos.length > 0) {
          text += `오늘 할 일이 ${_briefingTodayTodos.length}개 있습니다. `;
          _briefingTodayTodos.forEach((t, i) => {
            text += `${i+1}번, ${t.text}. `;
          });
        }
        if (_briefingOverdue.length > 0) {
          text += `주의! 완료하지 못한 지난 일정이 ${_briefingOverdue.length}개 있습니다. `;
          _briefingOverdue.forEach((t, i) => {
            text += `${i+1}번, ${t.text}. `;
          });
        }
      }
      return text;
    }

    const ELEVEN_API_KEY = 'a47960161d014a167261f504c3d9e72f9522b47769e115902e88d706828fd702';
    const ELEVEN_VOICE_ID = 'pNInz6obpgDQGcFmaJgB';
    let currentSource = null;

    async function startTTS() {
      const statusEl = document.getElementById('tts-status');
      const text = buildBriefingText();
      if (!text) return;

      const audio = new Audio();
      currentSource = audio;
      statusEl.textContent = '⏳ 음성 생성 중...';

      try {
        const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVEN_VOICE_ID}`, {
          method: 'POST',
          headers: {
            'Accept': 'audio/mpeg',
            'Content-Type': 'application/json',
            'xi-api-key': ELEVEN_API_KEY
          },
          body: JSON.stringify({
            text,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.5, similarity_boost: 0.75 }
          })
        });

        if (!res.ok) throw new Error('API 오류 ' + res.status);
        const blob = await res.blob();
        audio.src = URL.createObjectURL(blob);
        audio.onplay  = () => { statusEl.textContent = '🔊 음성 재생 중...'; };
        audio.onended = () => { statusEl.textContent = '✅ 재생 완료'; };
        audio.onerror = () => { statusEl.textContent = '❌ 재생 오류'; };
        await audio.play();

      } catch (e) {
        console.error(e);
        statusEl.textContent = '▶ 재생 버튼을 눌러 브리핑을 들어보세요';
      }
    }

    function stopTTS() {
      if (currentSource) { currentSource.pause(); currentSource = null; }
      const el = document.getElementById('tts-status');
      if (el) el.textContent = '⏹ 중지됨';
    }

    // ══════════════════════════════════════
    // 테스트 알림
    // ══════════════════════════════════════
    async function sendTestNotification() {
      if (typeof Notification === 'undefined') {
        alert('이 브라우저는 알림을 지원하지 않아요.');
        return;
      }
      if (Notification.permission === 'default') {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') {
          alert('알림 권한이 필요합니다.\n주소창 좌측 🔒 → 알림 → 허용 으로 변경해주세요.');
          return;
        }
      }
      if (Notification.permission === 'denied') {
        alert('알림이 차단되어 있어요.\n주소창 좌측 🔒 → 알림 → 허용 으로 변경해주세요.');
        return;
      }

      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready;
        const todayCount   = todos.filter(t => t.date === todayStr() && !t.done).length;
        const overdueCount = todos.filter(t => t.date < todayStr()  && !t.done).length;
        const body = todayCount === 0 && overdueCount === 0
          ? '오늘 예정된 일정이 없어요 😊'
          : `오늘 할 일 ${todayCount}개${overdueCount > 0 ? ` · 미완료 지난 일 ${overdueCount}개` : ''}`;

        await reg.showNotification('☀️ 오늘의 일정 브리핑 (테스트)', {
          body,
          icon: './icon.svg',
          badge: './icon.svg',
          data: { url: './todo.html?briefing=1' },
          tag: 'daily-briefing-test',
          requireInteraction: true
        });
      } else {
        const n = new Notification('☀️ 오늘의 일정 브리핑 (테스트)', {
          body: '알림을 클릭하면 브리핑이 열립니다!',
          icon: './icon.svg'
        });
        n.onclick = () => { window.focus(); showBriefing(true); n.close(); };
      }
    }

    function sendDailyNotification() {
      if (typeof Notification === 'undefined' || Notification.permission !== 'granted') {
        showBriefing(true);
        return;
      }
      if (!('serviceWorker' in navigator)) { showBriefing(true); return; }

      navigator.serviceWorker.ready.then(reg => {
        const todayCount  = todos.filter(t => t.date === todayStr() && !t.done).length;
        const overdueCount = todos.filter(t => t.date < todayStr()  && !t.done).length;
        const body = todayCount === 0 && overdueCount === 0
          ? '오늘 예정된 일정이 없어요 😊'
          : `오늘 할 일 ${todayCount}개${overdueCount > 0 ? ` · 미완료 지난 일 ${overdueCount}개` : ''}`;

        reg.showNotification('☀️ 오늘의 일정 브리핑', {
          body,
          icon: './icon.svg',
          badge: './icon.svg',
          data: { url: './todo.html?briefing=1' },
          tag: 'daily-briefing',
          requireInteraction: true
        });
      }).catch(() => showBriefing(true));
    }

    function checkBriefingTime() {
      const now = new Date();
      const todayKey = 'briefing_' + todayStr();
      if (now.getHours() === 7 && now.getMinutes() === 0 && !localStorage.getItem(todayKey)) {
        localStorage.setItem(todayKey, '1');
        sendDailyNotification();   // ← OS 알림 발송 (클릭 시 앱 열림 + 자동 재생)
      }
    }
    setInterval(checkBriefingTime, 30000);

    async function init() {
      renderCalendar();
      await loadTodos();

      const todayKey = 'briefing_' + todayStr();

      if (new URLSearchParams(window.location.search).get('briefing') === '1') {
        window.history.replaceState({}, '', window.location.pathname);
        showBriefing(true);
        return;
      }

      const now = new Date();
      if (now.getHours() >= 7 && !localStorage.getItem(todayKey)) {
        localStorage.setItem(todayKey, '1');
        showBriefing(true);
      }
    }

    function requestNotifPermission() {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') {
          document.getElementById('notif-banner').classList.add('hidden');
        }
      });
    }

    let deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredInstallPrompt = e;
      document.getElementById('install-banner').classList.remove('hidden');
    });

    function installPWA() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.then(() => {
        deferredInstallPrompt = null;
        document.getElementById('install-banner').classList.add('hidden');
      });
    }

    window.addEventListener('appinstalled', () => {
      document.getElementById('install-banner').classList.add('hidden');
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
          document.getElementById('notif-banner').classList.remove('hidden');
        }
      });

      // SW로부터 SHOW_BRIEFING 메시지 수신 → 자동 음성 브리핑 시작
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data && e.data.type === 'SHOW_BRIEFING') {
          showBriefing(true);
        }
      });
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.getElementById('todo-date').addEventListener('change', e => {
      selectedDate = e.target.value || null;
      renderCalendar(); renderTodos();
    });

    document.getElementById('todo-date').value = todayStr();

    addTap('modal-close-btn', closeBriefing);
    addTap('modal-confirm-btn', closeBriefing);
    addTap('tts-play-btn', startTTS);
    addTap('tts-stop-btn', stopTTS);

    document.getElementById('modal-overlay').addEventListener('touchend', function(e) {
      if (e.target === this) { e.preventDefault(); closeBriefing(); }
    }, { passive: false });
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeBriefing();
    });

    // ══════════════════════════════════════
    // FAB & 등록 모달
    // ══════════════════════════════════════
    let _addPriority = 'normal';

    function toggleFabMenu() {
      const menu = document.getElementById('fab-menu');
      const overlay = document.getElementById('fab-overlay');
      const btn = document.getElementById('fab-btn');
      const isOpen = menu.classList.contains('show');
      if (isOpen) {
        closeFabMenu();
      } else {
        menu.classList.add('show');
        overlay.classList.add('show');
        btn.classList.add('open');
      }
    }

    function closeFabMenu() {
      document.getElementById('fab-menu').classList.remove('show');
      document.getElementById('fab-overlay').classList.remove('show');
      document.getElementById('fab-btn').classList.remove('open');
    }

    function openAddModal(type) {
      closeFabMenu();
      const titleEl = document.getElementById('add-modal-title');
      titleEl.textContent = type === 'event' ? '일정' : '할 일';
      document.getElementById('add-title').value = '';
      document.getElementById('add-date').value = selectedDate || todayStr();
      document.getElementById('add-time').value = '';
      document.getElementById('add-memo').value = '';
      setAddPri('normal');
      document.getElementById('add-modal-overlay').classList.add('show');
      setTimeout(() => document.getElementById('add-title').focus(), 200);
    }

    function closeAddModal() {
      document.getElementById('add-modal-overlay').classList.remove('show');
    }

    function setAddPri(pri) {
      _addPriority = pri;
      ['high', 'normal', 'low'].forEach(p => {
        const btn = document.getElementById('add-pri-' + p);
        btn.className = 'add-pri-btn' + (p === pri ? ' sel-' + p : '');
      });
    }

    async function saveAddModal() {
      const title = document.getElementById('add-title').value.trim();
      if (!title) { document.getElementById('add-title').focus(); return; }
      const date = document.getElementById('add-date').value || todayStr();
      const time = document.getElementById('add-time').value || '';
      const memo = document.getElementById('add-memo').value || '';

      const { data, error } = await sb.from('todos').insert({
        title, date, completed: false,
        description: memo, priority: _addPriority, time
      }).select().single();

      if (error) { console.error('추가 오류:', error); alert('추가 실패: ' + (error.message || error.code || JSON.stringify(error))); return; }
      todos.push(mapFromDB(data));
      renderCalendar();
      renderTodos();
      closeAddModal();
    }

    document.getElementById('add-modal-overlay').addEventListener('touchend', function(e) {
      if (e.target === this) { e.preventDefault(); closeAddModal(); }
    }, { passive: false });
    document.getElementById('add-modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeAddModal();
    });

    init();
  </script>
</body>
