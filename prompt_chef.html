<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Chef - 안성재의 프롬프트 레시피</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { background-color: #020617; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
  pre { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ---------- Lucide Icon wrapper ----------
const resolveIconNode = (name) => {
  const L = window.lucide || {};
  const src = L.icons || L;
  const candidates = [
    name,
    name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase(),
    name.toLowerCase(),
  ];
  for (const k of candidates) {
    if (src[k]) return src[k];
  }
  return null;
};

const Icon = ({ name, size = 24, className = '', strokeWidth = 2, ...rest }) => {
  let node = resolveIconNode(name);
  if (!node) return null;
  // Handle full svg tuple ['svg', attrs, children]
  let children = node;
  if (Array.isArray(node) && typeof node[0] === 'string' && node[0] === 'svg') {
    children = node[2] || [];
  }
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      strokeWidth={strokeWidth}
      strokeLinecap="round"
      strokeLinejoin="round"
      className={className}
      {...rest}
    >
      {children.map(([tag, attrs], i) => {
        const props = { key: i };
        for (const k in attrs) {
          // convert kebab to camel for a few known ones
          if (k === 'stroke-width') props.strokeWidth = attrs[k];
          else if (k === 'stroke-linecap') props.strokeLinecap = attrs[k];
          else if (k === 'stroke-linejoin') props.strokeLinejoin = attrs[k];
          else if (k === 'fill-rule') props.fillRule = attrs[k];
          else if (k === 'clip-rule') props.clipRule = attrs[k];
          else props[k] = attrs[k];
        }
        return React.createElement(tag, props);
      })}
    </svg>
  );
};

const makeIcon = (name) => (props) => <Icon name={name} {...props} />;
const ChefHat = makeIcon('ChefHat');
const Sparkles = makeIcon('Sparkles');
const ArrowRight = makeIcon('ArrowRight');
const Copy = makeIcon('Copy');
const Check = makeIcon('Check');
const Flame = makeIcon('Flame');
const Utensils = makeIcon('Utensils');
const BookOpen = makeIcon('BookOpen');
const AlertCircle = makeIcon('AlertCircle');
const MenuIcon = makeIcon('Menu');
const X = makeIcon('X');
const Clock = makeIcon('Clock');
const HistoryIcon = makeIcon('History');
const ChevronDown = makeIcon('ChevronDown');
const ChevronUp = makeIcon('ChevronUp');
const KeyIcon = makeIcon('Key');

// ---------- localStorage-based history ----------
const HISTORY_KEY = 'prompt_chef_history';
const API_KEY_STORAGE = 'prompt_chef_api_key';

const loadHistory = () => {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  } catch { return []; }
};
const saveHistoryList = (list) => {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
};

// ---------- Main App ----------
const ChefPromptApp = () => {
  const [inputPrompt, setInputPrompt] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [copied, setCopied] = useState(false);
  const [activeTab, setActiveTab] = useState('recipe');
  const [currentDate, setCurrentDate] = useState('');

  const [historyList, setHistoryList] = useState([]);
  const [showHistory, setShowHistory] = useState(false);
  const [expandedHistoryId, setExpandedHistoryId] = useState(null);

  const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORAGE) || '');
  const [showApiKey, setShowApiKey] = useState(false);

  useEffect(() => {
    setHistoryList(loadHistory());
  }, []);

  useEffect(() => {
    const now = new Date();
    setCurrentDate(now.toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    }));
  }, []);

  const saveToHistory = (original, aiResult) => {
    const item = {
      id: Date.now().toString() + Math.random().toString(36).slice(2, 7),
      originalPrompt: original,
      result: aiResult,
      timestamp: Date.now(),
    };
    const next = [item, ...loadHistory()];
    saveHistoryList(next);
    setHistoryList(next);
  };

  const persistApiKey = (value) => {
    setApiKey(value);
    localStorage.setItem(API_KEY_STORAGE, value);
  };

  const generateEnhancedPrompt = async () => {
    if (!inputPrompt.trim()) return;
    if (!apiKey.trim()) {
      setError('Gemini API 키를 먼저 입력해 주세요. (상단 Key 버튼)');
      setShowApiKey(true);
      return;
    }

    setLoading(true);
    setError(null);
    setResult(null);

    const now = new Date();
    const todayString = now.toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });
    const timeString = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

    const systemInstruction = `
      당신은 '흑백요리사'의 안성재 셰프의 철학을 가진 최고의 AI 프롬프트 엔지니어입니다.

      [중요: 말투 및 피드백 지침]
      1. 말투: 안성재 셰프의 정중하지만 단호한 톤을 유지합니다.
      2. **가독성 최우선:** 결과물인 'upgraded_prompt'는 JSON이나 Code Block(\`\`\`)으로 감싸지 마십시오. 사용자가 바로 읽거나 복사해서 쓸 수 있는 **깔끔한 줄글 및 불렛포인트 형식**이어야 합니다.
      3. 비유보다는 **기능적 문제**를 직설적으로 지적하십시오.

      [시간 인식]
      - 현재 시각: ${todayString} ${timeString}
      - 과거/미래 구분 필수.

      [3가지 핵심 원칙 적용]
      1. 의도(Intent): 누가, 누구에게, 왜 쓰는가? (맥락 추가)
      2. 순서(Order): 지시 -> 예시 -> 제약조건 순으로 재배치.
      3. 간결함(Conciseness): 중복 제거.

      반드시 다음 JSON 형식으로만 응답하세요 (Markdown 코드 블록 없이 순수 JSON):
      {
        "upgraded_prompt": "여기에 업그레이드된 전체 프롬프트를 작성 (코드 블록 없이 순수 텍스트로 작성)",
        "chef_comment": "요리 비유를 최대한 배제하고, 원본 프롬프트의 가장 큰 문제점 1가지를 명확하게 지적하고 어떻게 해결했는지 설명하는 1~2문장.",
        "strategy": {
          "intent": "어떤 페르소나와 맥락을 추가했는지 구체적 설명",
          "order": "정보 배치를 어떻게 바꿨는지 설명",
          "conciseness": "어떤 불필요한 단어를 뺐는지 설명"
        }
      }
    `;

    const userQuery = `다음 프롬프트를 업그레이드해줘:\n\n"${inputPrompt}"`;

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: userQuery }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] },
            generationConfig: { responseMimeType: "application/json" }
          }),
        }
      );

      if (!response.ok) {
        const t = await response.text();
        throw new Error(`API Error: ${response.status} - ${t}`);
      }

      const data = await response.json();
      const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;

      if (textResponse) {
        const parsedResult = JSON.parse(textResponse);
        if (parsedResult.upgraded_prompt) {
          parsedResult.upgraded_prompt = parsedResult.upgraded_prompt
            .replace(/^```(markdown|json|text)?/i, '')
            .replace(/```$/, '')
            .trim();
        }
        setResult(parsedResult);
        setActiveTab('recipe');
        saveToHistory(inputPrompt, parsedResult);
      } else {
        throw new Error("No result generated.");
      }
    } catch (err) {
      console.error(err);
      setError("죄송합니다. 주방이 너무 바빠 주문을 처리하지 못했습니다. (" + err.message + ")");
    } finally {
      setLoading(false);
    }
  };

  const handleCopy = (text, setCopyState) => {
    if (!text) return;
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
      document.execCommand('copy');
      setCopyState(true);
      setTimeout(() => setCopyState(false), 2000);
    } catch (err) {
      console.error('Copy failed', err);
    }
    document.body.removeChild(textArea);
  };

  const toggleHistoryItem = (id) => {
    setExpandedHistoryId(expandedHistoryId === id ? null : id);
  };

  return (
    <div className="min-h-screen bg-slate-950 text-slate-200 font-sans selection:bg-amber-500/30">
      {/* Navigation */}
      <nav className="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex items-center justify-between h-16">
            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setShowHistory(false)}>
              <div className="p-2 bg-amber-600 rounded-lg shadow-lg shadow-amber-600/20">
                <ChefHat className="h-6 w-6 text-slate-950" />
              </div>
              <span className="text-xl font-bold bg-gradient-to-r from-amber-200 to-amber-500 bg-clip-text text-transparent">
                Prompt Chef
              </span>
            </div>

            <div className="flex items-center gap-2 sm:gap-4">
              <div className="hidden md:flex items-center gap-2 text-xs text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
                <Clock className="h-3 w-3 text-amber-500" />
                <span>{currentDate}</span>
              </div>

              <button
                onClick={() => setShowApiKey(!showApiKey)}
                className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold transition-all ${apiKey ? 'bg-slate-800 text-slate-300 hover:bg-slate-700' : 'bg-red-500/20 text-red-400 hover:bg-red-500/30'}`}
                title="Gemini API Key 설정"
              >
                <KeyIcon className="h-4 w-4" />
                <span className="hidden sm:inline">{apiKey ? 'Key' : 'Set Key'}</span>
              </button>

              <button
                onClick={() => setShowHistory(!showHistory)}
                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${showHistory ? 'bg-amber-500 text-slate-900' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}
              >
                <HistoryIcon className="h-4 w-4" />
                {showHistory ? 'Kitchen' : 'History'}
              </button>
            </div>
          </div>

          {showApiKey && (
            <div className="pb-4">
              <div className="bg-slate-950 border border-slate-700 rounded-lg p-3 flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
                <div className="text-xs text-slate-400 flex items-center gap-2 whitespace-nowrap">
                  <KeyIcon className="h-4 w-4 text-amber-500" />
                  Gemini API Key
                </div>
                <input
                  type="password"
                  value={apiKey}
                  onChange={(e) => persistApiKey(e.target.value)}
                  placeholder="AIza... (aistudio.google.com 에서 발급)"
                  className="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                />
                <button
                  onClick={() => setShowApiKey(false)}
                  className="px-4 py-2 bg-amber-500 text-slate-900 text-sm font-bold rounded hover:bg-amber-400"
                >
                  저장
                </button>
              </div>
              <p className="text-xs text-slate-500 mt-2">키는 브라우저 localStorage에만 저장됩니다.</p>
            </div>
          )}
        </div>
      </nav>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        {showHistory ? (
          <div className="animate-fadeIn space-y-6">
            <div className="text-center mb-8">
              <h2 className="text-3xl font-bold text-white mb-2">My Prompt Archive</h2>
              <p className="text-slate-400">지난 '요리' 기록들을 확인하고 복사할 수 있습니다.</p>
            </div>

            <div className="space-y-4">
              {historyList.length === 0 ? (
                <div className="text-center p-12 bg-slate-900 rounded-2xl border border-slate-800">
                  <HistoryIcon className="h-12 w-12 text-slate-700 mx-auto mb-4" />
                  <p className="text-slate-500">아직 저장된 기록이 없습니다.</p>
                </div>
              ) : (
                historyList.map((item) => {
                  const isExpanded = expandedHistoryId === item.id;
                  const dateStr = item.timestamp ? new Date(item.timestamp).toLocaleString('ko-KR') : 'Just now';

                  return (
                    <div key={item.id} className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden transition-all hover:border-slate-700">
                      <div
                        onClick={() => toggleHistoryItem(item.id)}
                        className="p-5 flex items-center justify-between cursor-pointer hover:bg-slate-800/50 transition-colors"
                      >
                        <div className="flex-1 min-w-0 pr-4">
                          <div className="flex items-center gap-3 text-xs text-amber-500 font-bold mb-1">
                            <Clock className="h-3 w-3" />
                            {dateStr}
                          </div>
                          <p className="text-slate-200 font-medium truncate">
                            {item.originalPrompt}
                          </p>
                        </div>
                        {isExpanded ? <ChevronUp className="h-5 w-5 text-slate-500" /> : <ChevronDown className="h-5 w-5 text-slate-500" />}
                      </div>

                      {isExpanded && (
                        <div className="border-t border-slate-800 bg-slate-950/50 p-6 space-y-6">
                          <div>
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-2">Original Request</span>
                            <div className="bg-slate-900/50 p-3 rounded-lg text-slate-400 text-sm">
                              {item.originalPrompt}
                            </div>
                          </div>

                          <div>
                            <div className="flex items-center justify-between mb-2">
                              <span className="text-xs font-bold text-amber-500 uppercase tracking-wider">Chef's Recipe (Upgraded)</span>
                              <HistoryCopyButton text={item.result?.upgraded_prompt} />
                            </div>
                            <pre className="whitespace-pre-wrap bg-slate-800/40 rounded-xl p-4 text-slate-100 text-sm leading-relaxed border border-slate-700 shadow-inner">
                              {item.result?.upgraded_prompt}
                            </pre>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-slate-800/30 p-4 rounded-lg border border-slate-700/50">
                              <div className="flex items-center gap-2 mb-2 text-slate-300 font-bold text-sm">
                                <ChefHat className="h-4 w-4 text-amber-500" /> Chef's Comment
                              </div>
                              <p className="text-xs text-slate-400 leading-relaxed italic">
                                "{item.result?.chef_comment}"
                              </p>
                            </div>
                            <div className="space-y-2">
                               <div className="flex items-start gap-2 text-xs text-blue-400">
                                 <Sparkles className="h-3 w-3 mt-0.5 flex-shrink-0" /> <span>Intent: {item.result?.strategy?.intent}</span>
                               </div>
                               <div className="flex items-start gap-2 text-xs text-green-400">
                                 <MenuIcon className="h-3 w-3 mt-0.5 flex-shrink-0" /> <span>Order: {item.result?.strategy?.order}</span>
                               </div>
                               <div className="flex items-start gap-2 text-xs text-purple-400">
                                 <Utensils className="h-3 w-3 mt-0.5 flex-shrink-0" /> <span>Conciseness: {item.result?.strategy?.conciseness}</span>
                               </div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })
              )}
            </div>
          </div>
        ) : (
          <>
            <div className="text-center mb-16 space-y-4">
              <h1 className="text-4xl md:text-5xl font-extrabold text-white tracking-tight">
                셰프의 레시피로 <br className="hidden md:block" />
                <span className="text-amber-500">완벽한 AI 프롬프트</span>를 요리하세요
              </h1>
              <p className="text-lg text-slate-400 max-w-2xl mx-auto">
                안성재 셰프의 철학(의도, 순서, 간결함)을 AI 프롬프트 엔지니어링에 적용합니다.
                단순한 명령어를 3성급 레시피로 업그레이드하세요.
              </p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
              <div className="space-y-6">
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl relative overflow-hidden group">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity" />

                  <div className="flex justify-between items-center mb-4">
                    <label className="text-sm font-bold text-amber-500 uppercase tracking-wider flex items-center gap-2">
                      <Utensils className="h-4 w-4" />
                      Raw Ingredients (Input)
                    </label>
                    <span className="text-xs text-slate-500">당신의 프롬프트를 입력하세요</span>
                  </div>

                  <textarea
                    value={inputPrompt}
                    onChange={(e) => setInputPrompt(e.target.value)}
                    placeholder="예: 마케팅 기획서 써줘, 엑셀 함수 알려줘..."
                    className="w-full h-64 bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-slate-300 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all resize-none text-lg leading-relaxed"
                  />

                  <div className="mt-6 flex justify-end">
                    <button
                      onClick={generateEnhancedPrompt}
                      disabled={loading || !inputPrompt.trim()}
                      className={`flex items-center gap-2 px-8 py-4 rounded-xl font-bold text-slate-950 transition-all transform hover:scale-105 active:scale-95 ${loading || !inputPrompt.trim() ? 'bg-slate-700 cursor-not-allowed text-slate-400' : 'bg-gradient-to-r from-amber-500 to-orange-600 hover:shadow-lg hover:shadow-orange-500/20'}`}
                    >
                      {loading ? (
                        <>
                          <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-slate-900"></div>
                          Cooking...
                        </>
                      ) : (
                        <>
                          <Flame className="h-5 w-5" />
                          Cook Prompt
                        </>
                      )}
                    </button>
                  </div>
                </div>

                <div className="hidden lg:grid grid-cols-3 gap-4">
                  {[
                    { title: '의도 (Intent)', desc: '명확한 페르소나와 범위', icon: Sparkles },
                    { title: '순서 (Order)', desc: '논리적인 구조 설계', icon: MenuIcon },
                    { title: '간결함 (Simple)', desc: '불필요한 요소 제거', icon: Check },
                  ].map((item, idx) => {
                    const I = item.icon;
                    return (
                      <div key={idx} className="bg-slate-900/50 border border-slate-800 p-4 rounded-xl text-center">
                        <I className="h-6 w-6 text-amber-500 mx-auto mb-2" />
                        <h3 className="font-bold text-slate-200 text-sm">{item.title}</h3>
                        <p className="text-xs text-slate-500 mt-1">{item.desc}</p>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="relative">
                 <div className="hidden lg:flex absolute top-1/3 -left-10 z-10 text-slate-700 justify-center w-12">
                    <ArrowRight className="h-8 w-8 animate-pulse" />
                 </div>

                <div className={`bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl min-h-[450px] flex flex-col transition-all duration-500 ${result ? 'ring-1 ring-amber-500/30' : ''}`}>

                  {!result && !loading && !error && (
                    <div className="flex-1 flex flex-col items-center justify-center text-slate-600 p-8 text-center">
                      <ChefHat className="h-16 w-16 mb-4 opacity-20" />
                      <p className="text-lg font-medium">아직 요리가 시작되지 않았습니다.</p>
                      <p className="text-sm mt-2">왼쪽에 프롬프트를 입력하고 요리를 시작해 주세요.</p>
                    </div>
                  )}

                  {loading && (
                    <div className="flex-1 flex flex-col items-center justify-center p-8 text-center">
                      <div className="relative">
                        <div className="absolute inset-0 bg-amber-500 blur-xl opacity-20 animate-pulse rounded-full"></div>
                        <Flame className="h-16 w-16 text-amber-500 animate-bounce relative z-10" />
                      </div>
                      <h3 className="text-xl font-bold text-white mt-6">재료를 손질하고 있습니다...</h3>
                      <p className="text-slate-400 mt-2">시간을 체크하고 의도를 분석 중입니다.</p>
                    </div>
                  )}

                  {error && !loading && (
                    <div className="flex-1 flex flex-col items-center justify-center p-8 text-center text-red-400">
                      <AlertCircle className="h-12 w-12 mb-4" />
                      <p>{error}</p>
                    </div>
                  )}

                  {result && !loading && (
                    <div className="flex flex-col h-full">
                      <div className="flex border-b border-slate-800">
                        <button
                          onClick={() => setActiveTab('recipe')}
                          className={`flex-1 py-4 text-sm font-bold tracking-wide transition-colors ${activeTab === 'recipe' ? 'text-amber-500 border-b-2 border-amber-500 bg-slate-800/50' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                          THE DISH (Prompt)
                        </button>
                        <button
                          onClick={() => setActiveTab('strategy')}
                          className={`flex-1 py-4 text-sm font-bold tracking-wide transition-colors ${activeTab === 'strategy' ? 'text-amber-500 border-b-2 border-amber-500 bg-slate-800/50' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                          CHEF'S NOTE (Strategy)
                        </button>
                      </div>

                      <div className="flex-1 p-6 overflow-y-auto max-h-[600px]">
                        {activeTab === 'recipe' ? (
                          <div className="space-y-6 animate-fadeIn">
                            <div className="bg-slate-800/50 border-l-4 border-amber-500 p-4 rounded-r-lg">
                               <div className="flex items-start gap-3">
                                 <div className="bg-slate-900 p-1.5 rounded-full">
                                   <ChefHat className="h-4 w-4 text-amber-500" />
                                 </div>
                                 <div>
                                   <p className="text-sm font-bold text-amber-500 mb-1">Chef's Comment</p>
                                   <p className="text-slate-300 text-sm italic">"{result.chef_comment}"</p>
                                 </div>
                               </div>
                            </div>

                            <div className="relative group">
                              <pre className="whitespace-pre-wrap bg-slate-800/40 rounded-xl p-6 text-slate-100 text-base leading-relaxed border border-slate-700 shadow-inner">
                                {result.upgraded_prompt}
                              </pre>
                              <div className="absolute top-3 right-3 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                                <button
                                  onClick={() => handleCopy(result.upgraded_prompt, setCopied)}
                                  className="bg-amber-600 hover:bg-amber-700 text-white p-2 rounded-lg shadow-lg flex items-center gap-2 text-xs font-bold transition-all"
                                >
                                  {copied ? <Check className="h-4 w-4" /> : <Copy className="h-4 w-4" />}
                                  {copied ? 'Copied!' : 'Copy'}
                                </button>
                              </div>
                            </div>
                          </div>
                        ) : (
                          <div className="space-y-6 animate-fadeIn">
                            <div className="space-y-4">
                              <StrategyCard
                                title="1. 의도 (Intent)"
                                content={result.strategy.intent}
                                icon={Sparkles}
                                color="text-blue-400"
                                borderColor="border-blue-500/30"
                              />
                              <StrategyCard
                                title="2. 순서 (Order)"
                                content={result.strategy.order}
                                icon={MenuIcon}
                                color="text-green-400"
                                borderColor="border-green-500/30"
                              />
                              <StrategyCard
                                title="3. 간결함 (Conciseness)"
                                content={result.strategy.conciseness}
                                icon={Utensils}
                                color="text-purple-400"
                                borderColor="border-purple-500/30"
                              />
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </>
        )}
      </main>

      <footer className="border-t border-slate-900 mt-12 py-8 text-center">
        <p className="text-slate-600 text-sm">
          Based on Chef Ahn Sung-jae's Philosophy & AI Prompt Engineering Framework
        </p>
      </footer>
    </div>
  );
};

const StrategyCard = ({ title, content, icon: IconComp, color, borderColor }) => (
  <div className={`bg-slate-800/30 border ${borderColor} rounded-xl p-4 transition-all hover:bg-slate-800/50`}>
    <div className="flex items-center gap-2 mb-2">
      <IconComp className={`h-5 w-5 ${color}`} />
      <h3 className={`font-bold ${color}`}>{title}</h3>
    </div>
    <p className="text-slate-300 text-sm leading-relaxed">
      {content}
    </p>
  </div>
);

const HistoryCopyButton = ({ text }) => {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    if (!text) return;
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
      document.execCommand('copy');
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (err) { console.error('Copy failed', err); }
    document.body.removeChild(textArea);
  };
  return (
    <button
      onClick={handleCopy}
      className="text-xs flex items-center gap-1 text-slate-400 hover:text-amber-500 transition-colors"
    >
      {copied ? <Check className="h-3 w-3" /> : <Copy className="h-3 w-3" />}
      {copied ? 'Copied' : 'Copy'}
    </button>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ChefPromptApp />);
</script>
</body>
</html>
